version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=file:./dev.db
    volumes:
      - ./server/dev.db:/app/dev.db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5001
    ports:
      - "80:80"
    depends_on:
      - server
